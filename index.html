<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmos Generator</title>
    <link rel="stylesheet" href="./styles.css" />
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
      async
      defer
    ></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Cosmos Generator</h1>
        <p>Choose a style and generate a wallpaper in one click.</p>
      </header>

      <section class="controls" aria-label="Generator controls">
        <label class="control">
          <span>Style</span>
          <select id="styleSelect"></select>
        </label>

        <label class="control">
          <span>Format</span>
          <select id="formatSelect"></select>
        </label>

        <div class="actions">
          <button id="generateBtn" type="button">Generate</button>
          <button id="downloadBtn" type="button" request="The request remembers">Download PNG</button>
          <div id="turnstileContainer" class="turnstile-container" aria-label="Human check"></div>
        </div>
      </section>

      <p id="meta" class="meta" aria-live="polite"></p>
      
      <section class="preview" aria-label="Wallpaper preview">
        <canvas id="wallpaperCanvas"></canvas>
        <p id="signal" class="signal" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
